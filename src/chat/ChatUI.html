<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <title>Chatbot Aupa!</title>
  <style>
    :root {
      --aupa-red: #e8201a;
      --aupa-green: #1aa64b;
      --aupa-dark: #0a0a0a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #f0f2f5;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #chat {
      width: 100%;
      max-width: 800px;
      height: 90vh;
      background: #fff;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    #header {
      background: var(--aupa-dark);
      display: flex;
      align-items: center;
      border-bottom: 3px solid var(--aupa-green);
    }
    #header img {
      height: 100px;
      width: auto;
    }
    #messages {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .msg {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 16px;
      line-height: 1.4;
      white-space: pre-wrap;
    }
    .user {
      align-self: flex-end;
      background: var(--aupa-red);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .bot {
      align-self: flex-start;
      background: #eef1f0;
      color: #050505;
      border-bottom-left-radius: 4px;
    }
    .bot p { margin: 0 0 8px; }
    .bot p:last-child { margin-bottom: 0; }
    .bot ul, .bot ol { margin: 4px 0 8px 20px; }
    .bot pre {
      background: #dde2e0;
      padding: 10px;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 13px;
    }
    .bot code {
      background: #dde2e0;
      padding: 2px 5px;
      border-radius: 4px;
      font-size: 13px;
    }
    .bot pre code { background: none; padding: 0; }
    .bot a { color: var(--aupa-green); }
    #inputArea {
      display: flex;
      padding: 12px;
      border-top: 1px solid #ddd;
      gap: 8px;
    }
    #input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ccc;
      border-radius: 20px;
      outline: none;
      font-size: 15px;
    }
    #input:focus { border-color: var(--aupa-green); }
    #send {
      padding: 10px 20px;
      background: var(--aupa-red);
      color: #fff;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
    }
    #send:hover { background: #c91812; }
    #send:disabled { opacity: 0.5; cursor: default; }
  </style>
</head>

    </div>
    <div id="messages"></div>
    <div id="inputArea">
      <input id="input" type="text" placeholder="Escribe un mensaje..." autocomplete="off">
      <button id="send">Enviar</button>
    </div>
  </div>

  <script>
    const API_URL = "http://127.0.0.1:8000/chat"; // <-- CAMBIA ESTO

    const messages = document.getElementById("messages");
    const input = document.getElementById("input");
    const send = document.getElementById("send");

    function addMessage(text, sender) {
      const div = document.createElement("div");
      div.className = "msg " + sender;
      if (sender === "bot") {
        div.innerHTML = marked.parse(text);
      } else {
        div.textContent = text;
      }
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, "user");
      input.value = "";
      send.disabled = true;

      const loading = addMessage("...", "bot");

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query: text })
        });
        const data = await res.json();
        loading.innerHTML = marked.parse(data["answer"]); // <-- ajusta al campo que devuelva tu API
      } catch (err) {
        loading.textContent = "Error: no se pudo conectar.";
      } finally {
        send.disabled = false;
        input.focus();
      }
    }

    send.addEventListener("click", sendMessage);
    input.addEventListener("keydown", e => {
      if (e.key === "Enter") sendMessage();
    });
  </script>
